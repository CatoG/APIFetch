<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather Report</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', 'Segoe UI', sans-serif;
      min-height: 100vh;
      background: linear-gradient(160deg, #0a1628 0%, #0f2240 50%, #0a1e3d 100%);
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px 64px;
      transition: background 1.4s ease;
    }

    /* ── Header ── */
    .site-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .site-header h1 {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 7px;
      text-transform: uppercase;
      color: rgba(100,200,255,0.9);
      margin-bottom: 8px;
      text-shadow: 0 0 24px rgba(80,180,255,0.4);
    }

    .site-header .tagline {
      font-size: 0.65rem;
      color: rgba(255,255,255,0.2);
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    /* ── Form ── */
    form {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 24px 28px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: flex-end;
      width: 100%;
      max-width: 640px;
      margin-bottom: 36px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
      flex: 1;
      min-width: 100px;
    }

    label {
      font-size: 0.65rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: rgba(80,180,255,0.6);
    }

    input {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 9px 12px;
      color: #fff;
      font-family: inherit;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    input:focus {
      border-color: rgba(168,216,234,0.5);
      background: rgba(255,255,255,0.09);
    }

    .btn-primary {
      background: linear-gradient(135deg, #38b6f0, #1a7abf);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 9px 22px;
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 600;
      letter-spacing: 0.3px;
      cursor: pointer;
      align-self: flex-end;
      transition: opacity 0.2s, transform 0.1s;
      box-shadow: 0 4px 20px rgba(50,160,240,0.4), 0 0 0 1px rgba(80,180,255,0.2);
    }

    .btn-primary:hover { opacity: 0.88; }
    .btn-primary:active { transform: scale(0.97); }

    .btn-locate {
      background: transparent;
      color: rgba(168,216,234,0.8);
      border: 1px solid rgba(168,216,234,0.3);
      border-radius: 10px;
      padding: 9px 16px;
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      align-self: flex-end;
      white-space: nowrap;
      min-width: 120px;
      transition: background 0.2s, border-color 0.2s;
    }

    .btn-locate:hover {
      background: rgba(168,216,234,0.07);
      border-color: rgba(168,216,234,0.55);
    }

    /* ── Main output ── */
    #weatherInfo { width: 100%; max-width: 640px; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .animate { animation: fadeUp 0.45s ease both; }
    .animate-delay-1 { animation-delay: 0.08s; }
    .animate-delay-2 { animation-delay: 0.16s; }
    .animate-delay-3 { animation-delay: 0.24s; }

    /* ── Hero card ── */
    .hero-card {
      backdrop-filter: blur(2px);
      border-radius: 24px;
      padding: 36px 36px 28px;
      margin-bottom: 12px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.07);
    }

    .hero-card-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      transition: background-image 0.8s ease;
    }

    .hero-card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(160deg, rgba(8,18,36,0.82) 0%, rgba(10,24,50,0.78) 60%, rgba(8,16,36,0.88) 100%);
    }

    .hero-card-content {
      position: relative;
      z-index: 1;
    }

    .hero-card::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(80,180,255,0.7), rgba(120,220,255,0.9), rgba(80,180,255,0.7), transparent);
      z-index: 2;
    }

    .hero-location {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(80,180,255,0.7);
      margin-bottom: 20px;
    }

    .hero-temp-row {
      display: flex;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 6px;
    }

    .hero-temp {
      font-size: 5.5rem;
      font-weight: 300;
      line-height: 1;
      color: #fff;
      letter-spacing: -3px;
      text-shadow: 0 0 60px rgba(80,180,255,0.35), 0 2px 4px rgba(0,0,0,0.4);
    }

    .hero-temp sup {
      font-size: 1.8rem;
      font-weight: 400;
      letter-spacing: 0;
      color: rgba(255,255,255,0.6);
      vertical-align: super;
    }

    .hero-right {
      padding-top: 10px;
    }

    .hero-condition {
      font-size: 1.05rem;
      font-weight: 400;
      color: rgba(140,210,255,0.95);
      text-transform: capitalize;
      margin-bottom: 4px;
    }

    .hero-feels {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.35);
    }

    .hero-divider {
      height: 1px;
      background: rgba(255,255,255,0.07);
      margin: 20px 0 16px;
    }

    .hero-meta {
      font-size: 0.68rem;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.3px;
    }

    /* ── Hourly strip ── */
    .hourly-strip {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 2px 2px 14px;
      margin-bottom: 12px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.08) transparent;
    }

    .hourly-strip::-webkit-scrollbar { height: 3px; }
    .hourly-strip::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 4px; }

    .hourly-card {
      flex: 0 0 auto;
      border-radius: 14px;
      padding: 14px 12px;
      text-align: center;
      min-width: 68px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      transition: transform 0.15s;
    }

    .hourly-card:hover { transform: translateY(-2px); }

    .hourly-card.now { box-shadow: 0 0 0 1.5px rgba(168,216,234,0.5); }

    .h-time {
      font-size: 0.62rem;
      font-weight: 500;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .hourly-card.now .h-time { color: rgba(168,216,234,0.8); }

    .h-temp {
      font-size: 1.05rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 6px;
    }

    .h-cond {
      font-size: 0.6rem;
      color: rgba(255,255,255,0.4);
      line-height: 1.4;
      text-transform: capitalize;
    }

    /* ── Detail card ── */
    .detail-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 24px 24px;
      margin-bottom: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .detail-section-label {
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(80,180,255,0.55);
      margin-bottom: 14px;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2px;
    }

    .detail-item {
      padding: 14px 16px;
      border-radius: 12px;
    }

    .detail-item:hover { background: rgba(255,255,255,0.04); }

    .detail-label {
      font-size: 0.65rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.3);
      margin-bottom: 5px;
    }

    .detail-value {
      font-size: 1.15rem;
      font-weight: 500;
      color: #fff;
      text-shadow: 0 1px 4px rgba(0,0,0,0.3);
    }

    .detail-card + .detail-card { margin-top: 0; }

    .section-divider {
      height: 1px;
      background: rgba(255,255,255,0.06);
      margin: 4px 0 14px;
    }

    /* ── Raw JSON ── */
    .raw-json {
      background: rgba(0,0,0,0.25);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 20px;
      padding: 20px 24px;
      margin-top: 12px;
    }

    .raw-json h3 {
      font-size: 0.62rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: rgba(168,216,234,0.4);
      margin-bottom: 12px;
    }

    .raw-json pre {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.3);
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-all;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <h1>Weather Report</h1>
    <p class="tagline">Powered by MET Norway</p>
  </header>

  <form id="weatherForm">
    <div class="field">
      <label for="lat">Latitude</label>
      <input type="text" id="lat" name="lat" value="59.7833">
    </div>
    <div class="field">
      <label for="lon">Longitude</label>
      <input type="text" id="lon" name="lon" value="10.7976">
    </div>
    <div class="field">
      <label for="altitude">Altitude (m)</label>
      <input type="text" id="altitude" name="altitude" value="40">
    </div>
    <button type="submit" class="btn-primary">Get Weather</button>
    <button type="button" class="btn-locate" onclick="useMyLocation()">&#9737; My Location</button>
  </form>

  <div id="weatherInfo"></div>
  <script src="./weather_report.js"></script>
</body>
</html>
